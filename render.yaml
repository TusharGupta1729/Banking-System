services:
  - type: web
    name: banking-system-api
    env: go
    plan: free
    buildCommand: go build -o app ./cmd
    startCommand: ./app
    envVars:
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: banking-system-db
          property: connectionString

databases:
  - name: banking-system-db
    plan: free
    postgresMajorVersion: 16
